apiVersion: v1
kind: Namespace
metadata:
  name: sandbox-executions
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-utility-service
  namespace: sandbox-executions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-utility-service
  namespace: sandbox-executions
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-utility-service
  namespace: sandbox-executions
subjects:
  - kind: ServiceAccount
    name: sandbox-utility-service
    namespace: sandbox-executions
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-utility-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-utility-service
  namespace: sandbox-executions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-utility-service
  template:
    metadata:
      labels:
        app: sandbox-utility-service
    spec:
      serviceAccountName: sandbox-utility-service
      containers:
        - name: api
          image: sandbox-utility-service:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: SANDBOX_RUNNER
              value: kubernetes
            - name: SANDBOX_KUBERNETES_NAMESPACE
              value: sandbox-executions
            - name: SANDBOX_KUBERNETES_RUNTIME_IMAGE
              value: sandbox-python-datascience:0.1.0
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-utility-service
  namespace: sandbox-executions
spec:
  selector:
    app: sandbox-utility-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
